<!--
  snippets/sticky-mobile-bar.html

  Drop-in sticky bottom bar for mobile.
  Hidden on screens wider than 768px.
  Uses inline styles for portability — extract to your CSS as needed.
-->

<style>
  .nc-mobile-bar {
    display: none;
  }

  @media (max-width: 768px) {
    .nc-mobile-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: #1a1a1a;
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.25);
      padding: 8px 4px calc(8px + env(safe-area-inset-bottom)) 4px;
    }

    .nc-mobile-bar a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      color: #ffffff;
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      min-height: 48px;
      border-radius: 6px;
      transition: background 0.15s ease;
    }

    .nc-mobile-bar a:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .nc-mobile-bar svg {
      width: 22px;
      height: 22px;
      margin-bottom: 4px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
    }

    /* Spacer so content isn't covered */
    body {
      padding-bottom: 72px;
    }
  }
</style>
