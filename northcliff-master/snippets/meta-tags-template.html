<!--
  snippets/meta-tags-template.html

  Drop these into the <head> of each page.
  Replace the {{PAGE_*}} placeholders with values per page.
-->

<!-- Primary -->
<title>{{PAGE_TITLE}}</title>
<meta name="description" content="{{PAGE_DESCRIPTION}}">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{PAGE_CANONICAL_URL}}">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="NorthCliff Commons">
<meta property="og:title" content="{{PAGE_TITLE}}">
<meta property="og:description" content="{{PAGE_DESCRIPTION}}">
<meta property="og:url" content="{{PAGE_CANONICAL_URL}}">
<meta property="og:image" content="https://northcliffcommons.com/assets/og/northcliff-og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="NorthCliff Commons — New Apartments in Shelton, WA. Opening December 2027.">
<meta property="og:locale" content="en_US">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{PAGE_TITLE}}">
<meta name="twitter:description" content="{{PAGE_DESCRIPTION}}">
<meta name="twitter:image" content="https://northcliffcommons.com/assets/og/northcliff-og-image.jpg">
<meta name="twitter:image:alt" content="NorthCliff Commons — New Apartments in Shelton, WA. Opening December 2027.">

<!-- Theme -->
<meta name="theme-color" content="#1a1a1a">
